# BLACK
# =====
[tool.black]
line-length    = 80
# target-version = ["py313"]
preview        = true
exclude        = '''
/(
    \.git
  | \.direnv
  | build
  | dist
  | beetle_tools
  | __pypackages__
  | migrations
  | .*_pb2\.py     # skip autogenerated protobufs
)/
'''

# DOCFORMATTER
# ============
[tool.docformatter]
black             = true   # keeps the same quote style & spacing Black likes
recursive         = true   # walk sub-dirs - matches `--recursive`
in-place          = true   # modify files rather than printing diff
wrap-summaries    = 80
wrap-descriptions = 80
exclude = [
  ".git", ".direnv", "build", "dist",
  "beetle_tools", "__pypackages__", "migrations",
  ".*_pb2.py",                       # protobuf stubs
]